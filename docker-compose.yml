services:
  # 1. Baza danych MySQL z obsługą Secrets
  db:
    image: mysql:8.0
    container_name: lemp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: testowa_baza
      MYSQL_USER: lemp_user
    volumes:
      - mysql_data:/var/lib/mysql
    secrets:
      - db_root_password
      - db_password
    networks:
      - backend

  # 2. Serwer PHP (PHP-FPM)
  php:
    image: php:8.2-fpm
    container_name: lemp_php
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
    networks:
      - backend

  # 3. Serwer WWW Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: lemp_nginx
    restart: unless-stopped
    ports:
      - "4001:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - frontend
      - backend

  # 4. Panel phpMyAdmin z obsługą Secrets
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: lemp_phpmyadmin
    restart: unless-stopped
    ports:
      - "6001:80"
    environment:
      PMA_HOST: db
      PMA_PASSWORD_FILE: /run/secrets/db_root_password
    secrets:
      - db_root_password
    depends_on:
      - db
    networks:
      - frontend
      - backend

volumes:
  mysql_data:

networks:
  frontend:
  backend:

secrets:
  db_root_password:
    file: ./db_root_password.txt
  db_password:
    file: ./db_password.txt